name: Orion SEO/AEO Weekly Pipeline

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 7am UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Orion SEO/AEO Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Running Orion pipeline for $TODAY"
          claude --dangerously-skip-permissions -p "Run the Orion SEO/AEO pipeline. Today's date is $TODAY. Use the workflow script at .claude-workflow/orion-seo-pipeline.js passing runDate as $TODAY. Run all agents, create Jira tickets in MKTG, update Confluence page 3420782599."

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orion-pipeline-${{ github.run_id }}
          path: |
            output/
            queue/
          retention-days: 90
